name: Desktop Release (Windows / macOS / Linux)

# Build the downloadable desktop apps with Tauri on each platform's native runner
# (Windows .exe/.msi, macOS .dmg, Linux .AppImage/.deb). These can't be cross-built
# from one machine, so each OS gets its own runner. Triggered by pushing a vN.N.N tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # produces a universal (Intel + Apple Silicon) .dmg
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04      # produces .AppImage + .deb
            args: ''
          - platform: windows-latest    # produces .exe (NSIS) + .msi
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm deps
        run: npm ci

      - name: Build offline web payload (dist/)
        run: node scripts/make-dist.mjs

      - name: Build & release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Breach Protocol ${{ github.ref_name }}'
          releaseBody: 'Downloadable builds of Breach Protocol. See assets below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
