name: Android Release (signed APK + AAB)

# Build a downloadable Android app with Capacitor + Gradle on Linux.
# If the KEYSTORE_BASE64 secret (+ password/alias secrets) is set, this produces a
# SIGNED release APK and AAB. If not, it falls back to an unsigned debug APK so the
# workflow never hard-fails. See SIGNING.md for the secrets to configure.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Consumed by android/app/build.gradle's signing config.
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'   # Gradle 8.2.1 supports up to Java 20; 17 is the safe, supported choice

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build offline web payload (dist/)
        run: node scripts/make-dist.mjs

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Decode signing keystore (if configured)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded — building SIGNED release."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "No KEYSTORE_BASE64 secret — building unsigned debug APK."
          fi

      - name: Build signed release (APK + AAB)
        if: steps.keystore.outputs.signed == 'true'
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Build debug APK (no signing secrets)
        if: steps.keystore.outputs.signed == 'false'
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Collect artifacts
        run: |
          mkdir -p out
          find android/app/build/outputs -name '*.apk' -exec cp {} out/ \;
          find android/app/build/outputs -name '*.aab' -exec cp {} out/ \;
          ls -la out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: breach-protocol-android
          path: out/*

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: 'Breach Protocol ${{ github.ref_name }}'
          files: out/*
